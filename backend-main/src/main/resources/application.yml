spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB
  
  application:
    name: backend-main
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${POSTGRES_DB:mystudyapp}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:changeme-strong-password-here}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      "[hibernate.format_sql]": false

# JWT
jwt:
  secret: ${JWT_SECRET:changeme-changeme-changeme-changeme-changeme-changeme-chang}
  access:
    expiration-ms: 900000
  refresh:
    expiration-ms: 604800000

# MQTT
# MQTT
mqtt:
  broker-url: tcp://${MQTT_HOST:localhost}:1883
  client-id: backend-main-subscriber
  topic:
    events: mystudyapp/events
    alerts: mystudyapp/alerts

# Application Storage Configuration
app:
  storage:
    avatar-location: uploads/avatars
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@mystudyapp.de}