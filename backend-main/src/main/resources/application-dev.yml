# Development Profile Overrides
spring:
  servlet:
    multipart:
      enabled: true
      # Must be >= max video size (20 MB) + margin, otherwise Spring rejects large uploads
      max-file-size: 25MB
      max-request-size: 25MB
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
  
  application:
    name: backend-main
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${POSTGRES_DB:mystudyapp}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:changeme-strong-password-here}
    driver-class-name: org.postgresql.Driver
  
  # Gmail SMTP Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:ahmedmhiri2004@gmail.com}
    password: ${MAIL_PASSWORD:kobc yyrv nkdn ngtc}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# Logging
logging:
  level:
    de.fhdortmund.mystudyapp: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.mail: DEBUG

# JWT
jwt:
  secret: ${JWT_SECRET:H6Vmw1mgVgov9Xx3vEmWNyFe+lJE8cBXOGKZ4F/HHRY=}
  access:
    expiration-ms: 900000
  refresh:
    expiration-ms: 604800000

# MQTT
mqtt:
  broker-url: tcp://${MQTT_HOST:localhost}:1883
  client-id: backend-main-subscriber
  topic:
    events: mystudyapp/events
    alerts: mystudyapp/alerts

# Application Storage Configuration
app:
  storage:
    # Base directory. FileStorageService appends /avatars and /events automatically.
    avatar-location: uploads
    event-media-location: uploads
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@mystudyapp.de}

server:
  port: ${SERVER_PORT:8081}