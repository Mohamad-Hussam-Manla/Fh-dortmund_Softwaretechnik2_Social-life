# Production Profile Overrides
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      "[hibernate.format_sql]": false
  
  # Production Email Configuration (use environment variables)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# Logging
logging:
  level:
    root: WARN
    com.mystudyapp: INFO
    # Optional: reduce multipart logging noise in production
    org.springframework.web.multipart: WARN

# Application Storage Configuration
app:
  storage:
    avatar-location: /var/data/mystudyapp/uploads/avatars
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@mystudyapp.de}